<h1>Online Course Exam</h1>

<form method="POST" action="/submit/">
  {% csrf_token %}

  {% for q in questions %}
    <h3>{{ q.text }}</h3>

    {% for c in q.choice_set.all %}
      <input type="radio" name="{{ q.id }}" value="{{ c.id }}">
      {{ c.text }}<br>
    {% endfor %}

  {% endfor %}

  <button type="submit">Submit Exam</button>
</form>
